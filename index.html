<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcolia - Access Without Permission</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.umd.min.js"></script>
</head>
<body>
    <!-- Background Image -->
    <div class="background-container">
        <img src="https://customer-assets.emergentagent.com/job_5f4ad191-281f-40c5-b666-9b6aafb80095/artifacts/uidem9rb_Doors.png" alt="Arcolia Gate" class="background-image">
        <div class="background-overlay"></div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="content-wrapper">
            <!-- Title Section -->
            <h1 class="title" data-testid="arcolia-title">Arcolia</h1>
            <p class="subtitle" data-testid="arcolia-subtitle">Access Without Permission</p>

            <!-- Spacer to push button down -->
            <div class="spacer"></div>

            <!-- Enter Button -->
            <button class="enter-button" id="enterButton" data-testid="enter-arcolia-btn">
                Enter Arcolia
            </button>

            <!-- Wallet Connect Section (hidden by default) -->
            <div class="wallet-section" id="walletSection" data-testid="wallet-section">
                <div class="wallet-status" id="walletStatus" data-testid="wallet-status">
                    <span id="statusText">Connect your wallet to enter</span>
                </div>
                
                <button class="wallet-button" id="connectWalletBtn" data-testid="connect-wallet-btn">
                    <svg class="metamask-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21.37 3L13.06 9.24L14.57 5.52L21.37 3Z" fill="#E17726"/>
                        <path d="M2.63 3L10.87 9.3L9.43 5.52L2.63 3Z" fill="#E27625"/>
                        <path d="M18.44 16.16L16.31 19.5L20.92 20.77L22.24 16.23L18.44 16.16Z" fill="#E27625"/>
                        <path d="M1.77 16.23L3.08 20.77L7.69 19.5L5.56 16.16L1.77 16.23Z" fill="#E27625"/>
                        <path d="M7.42 10.73L6.14 12.62L10.71 12.85L10.55 7.94L7.42 10.73Z" fill="#E27625"/>
                        <path d="M16.58 10.73L13.41 7.88L13.29 12.85L17.86 12.62L16.58 10.73Z" fill="#E27625"/>
                        <path d="M7.69 19.5L10.44 18.17L8.07 16.26L7.69 19.5Z" fill="#E27625"/>
                        <path d="M13.56 18.17L16.31 19.5L15.93 16.26L13.56 18.17Z" fill="#E27625"/>
                    </svg>
                    Connect MetaMask
                </button>

                <button class="wallet-button secondary" id="disconnectBtn" style="display: none;" data-testid="disconnect-wallet-btn">
                    Disconnect
                </button>

                <!-- Wallet Info Display -->
                <div class="wallet-info" id="walletInfo" style="display: none;" data-testid="wallet-info">
                    <div class="wallet-address" id="walletAddress" data-testid="wallet-address"></div>
                    <div class="wallet-balance" id="walletBalance" data-testid="wallet-balance"></div>
                    <div class="arco-balance" id="arcoBalance" data-testid="arco-balance"></div>
                    <div class="wallet-network" id="walletNetwork" data-testid="wallet-network"></div>
                </div>

                <!-- Error Message -->
                <div class="error-message" id="errorMessage" style="display: none;" data-testid="error-message">
                    <span id="errorText"></span>
                </div>
            </div>
        </div>
    </main>

    <script src="wallet.js"></script>
</body>
</html>
